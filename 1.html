<h2 id="org4551561">《宁静祷文》</h2>
<div class="outline-text-2" id="text-org4551561">
<blockquote>
<p>
上帝，<br />
</p>

<p>
请赐予我平静，去接受我无法改变的。<br />
</p>

<p>
给予我勇气，去改变我能改变的，<br />
</p>

<p>
赐我智慧，分辨这两者的区别。<br />
</p>
</blockquote>
</div>
</div>

<div id="outline-container-orgdd52652" class="outline-2">
<h2 id="orgdd52652">《幸运星》</h2>
<div class="outline-text-2" id="text-orgdd52652">
<blockquote>
<p>
我并不羡慕别人的人生，这就是所谓幸福。<br />
</p>
</blockquote>
</div>
</div>

<div id="outline-container-org9d9df1d" class="outline-2">
<h2 id="org9d9df1d">《洛丽塔》</h2>
<div class="outline-text-2" id="text-org9d9df1d">
<blockquote>
<p>
人有三样东西是无法隐瞒的，咳嗽、穷困和爱；你想隐瞒越欲盖弥彰。<br />
</p>

<p>
人有三样东西是不该挥霍的，身体、金钱和爱；你想挥霍却得不偿失。<br />
</p>

<p>
人有三样东西是无法挽留的，时间、生命和爱；你想挽留却渐行渐远。<br />
</p>

<p>
人有三样东西是不该回忆的，灾难、死亡和爱；你想回忆却苦不堪言。<br />
</p>
</blockquote>
</div>
